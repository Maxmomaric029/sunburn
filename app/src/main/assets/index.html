<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SUNBURN Overlay</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap');

        :root {
            --glass-bg: rgba(8, 8, 12, 0.72);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.45);
            --accent: #ff3b30;
            --accent2: #cc0000;
            --glow: rgba(255, 59, 48, 0.3);
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: transparent;
            height: 100vh;
            overflow: hidden;
            position: relative;
            font-family: 'Rajdhani', sans-serif;
        }

        /* ── Efecto Sangre Oscura Estrellada ── */
        .tab-bar, .target-selector, .switch-track, .action-btn, .modal-box {
            background-color: #110000;
            background-image:
                radial-gradient(circle at 20% 30%, rgba(255, 0, 0, 0.15) 1px, transparent 2px),
                radial-gradient(circle at 80% 60%, rgba(255, 0, 0, 0.2) 1.5px, transparent 3px),
                radial-gradient(circle at 40% 80%, rgba(200, 0, 0, 0.1) 1px, transparent 2px),
                linear-gradient(135deg, rgba(40, 0, 0, 0.6) 0%, rgba(5, 0, 0, 0.8) 100%);
            background-size: 30px 30px, 50px 50px, 20px 20px, 100% 100%;
        }

        /* ── Canvas BG ── */
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* ── FOV Circle ── */
        #fovCircle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 1.5px solid rgba(255, 255, 255, 0.7);
            border-radius: 50%;
            box-shadow: 0 0 14px rgba(255, 77, 28, 0.25);
            pointer-events: none;
            display: none;
            z-index: 9999;
            transition: width 0.12s ease, height 0.12s ease;
        }

        /* ── Modal ── */
        #mySensiModal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.88);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 100000;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .modal-box {
            border: 1px solid rgba(255, 77, 28, 0.3);
            border-radius: 16px;
            padding: 40px 36px;
            text-align: center;
            box-shadow: 0 0 40px rgba(255, 77, 28, 0.15), 0 20px 60px rgba(0, 0, 0, 0.9);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 90%;
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .modal-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 26px;
            color: #fff;
            letter-spacing: 4px;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        #sensiNameDisplay {
            display: block;
            font-size: 34px;
            margin-top: 10px;
            transition: color 0.3s, text-shadow 0.3s;
        }

        .modal-btn {
            background: var(--accent);
            background-image: none;
            color: #fff;
            border: none;
            padding: 10px 32px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 18px;
            letter-spacing: 2px;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 0 20px rgba(255, 77, 28, 0.3);
        }

        .modal-btn:active { transform: scale(0.95); }
        .modal-btn:hover { box-shadow: 0 0 28px rgba(255, 77, 28, 0.3); }

        /* ── Main Menu ── */
        .mod-menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 370px;
            height: 86vh;
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(160%);
            -webkit-backdrop-filter: blur(20px) saturate(160%);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.95), inset 0 1px 0 rgba(255, 255, 255, 0.04);
            display: flex;
            flex-direction: column;
            z-index: 10;
            overflow: hidden;
            animation: menuFadeIn 0.4s ease forwards;
            touch-action: none;
        }

        @keyframes menuFadeIn {
            0% { opacity: 0; transform: scale(0.96); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* ── Header ── */
        .menu-header {
            padding: 14px 18px;
            background: rgba(0, 0, 0, 0.5);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
            z-index: 10;
            flex-shrink: 0;
            cursor: grab;
        }

        .menu-header:active { cursor: grabbing; }

        .header-logo {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            object-fit: cover;
            border: 1px solid rgba(255, 77, 28, 0.4);
            box-shadow: 0 0 12px rgba(255, 77, 28, 0.18);
            flex-shrink: 0;
        }

        .header-logo-placeholder {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: 1px solid rgba(255, 77, 28, 0.5);
            box-shadow: 0 0 14px rgba(255, 77, 28, 0.4);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 16px;
            color: #fff;
        }

        .header-text { flex: 1; }

        .menu-title {
            font-family: 'Bebas Neue', sans-serif;
            font-weight: 400;
            font-size: 26px;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 77, 28, 0.6), 0 2px 8px rgba(0, 0, 0, 0.9);
            line-height: 1;
            display: block;
        }

        .menu-subtitle {
            font-family: 'Space Mono', monospace;
            font-size: 9px;
            color: #fff;
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0.8;
            margin-top: 2px;
            display: block;
        }

        .close-btn {
            color: var(--text-muted);
            font-family: 'Space Mono', monospace;
            font-size: 14px;
            cursor: pointer;
            transition: color 0.2s, transform 0.2s;
            padding: 4px;
        }

        .close-btn:hover {
            color: #fff;
            transform: rotate(90deg);
        }

        /* ── Tabs ── */
        .tab-bar {
            display: flex;
            border-bottom: 1px solid var(--glass-border);
            flex-shrink: 0;
            position: relative;
            z-index: 5;
        }

        .tab-btn {
            flex: 1;
            padding: 10px 0;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 15px;
            letter-spacing: 2px;
            color: var(--text-muted);
            cursor: pointer;
            text-align: center;
            transition: color 0.2s;
            position: relative;
        }

        .tab-btn::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 20%;
            right: 20%;
            height: 2px;
            background: var(--accent);
            border-radius: 2px 2px 0 0;
            transform: scaleX(0);
            transition: transform 0.25s cubic-bezier(0.22, 1, 0.36, 1);
            box-shadow: 0 0 8px var(--glow);
        }

        .tab-btn.active { color: #fff; }
        .tab-btn.active::after { transform: scaleX(1); }

        .tab-panel {
            display: none;
            flex-direction: column;
            height: 100%;
        }

        .tab-panel.active { display: flex; }

        /* ── Milk Layer ── */
        .milk-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            border-radius: 18px;
            overflow: hidden;
        }

        /* ── Menu Content ── */
        .menu-content {
            padding: 0;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 59, 48, 0.18) transparent;
            position: relative;
            z-index: 2;
            height: 100%;
            flex: 1;
        }

        .content-inner { padding: 18px 18px 28px; }

        .section-banner {
            width: 100%;
            height: 72px;
            background-size: cover;
            background-position: center;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 59, 48, 0.12);
            display: flex;
            align-items: flex-end;
            justify-content: flex-start;
            position: relative;
            overflow: hidden;
        }

        .section-banner::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.7) 0%, transparent 60%);
        }

        .section-title {
            color: #fff;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 16px;
            letter-spacing: 3px;
            padding: 8px 12px;
            position: relative;
            z-index: 1;
        }

        .control-group {
            margin-bottom: 22px;
            transition: all 0.2s;
            animation: fadeSlideUp 0.4s ease both;
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .control-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-main);
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .control-value {
            color: #fff;
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            font-weight: 700;
        }

        /* ── Switches ── */
        .switch-container {
            display: inline-flex;
            align-items: center;
            cursor: pointer;
        }

        .switch-track {
            width: 38px;
            height: 20px;
            border-radius: 12px;
            position: relative;
            transition: background 0.3s, border-color 0.3s;
            border: 1px solid rgba(255, 59, 48, 0.15);
        }

        .switch-thumb {
            width: 14px;
            height: 14px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: transform 0.3s, background 0.3s;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
        }

        .switch-container input[type="checkbox"] { display: none; }

        .switch-container input[type="checkbox"]:checked + .switch-track {
            background: var(--accent);
            background-image: none;
            border-color: var(--accent);
            box-shadow: 0 0 10px var(--glow);
        }

        .switch-container input[type="checkbox"]:checked + .switch-track .switch-thumb {
            transform: translateX(18px);
            background: #fff;
        }

        /* ── Sliders ── */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            height: 24px;
            display: flex;
            align-items: center;
        }

        input[type=range]:focus { outline: none; }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: linear-gradient(to right, var(--fill-c, var(--accent)) var(--perc, 0%), var(--empty-c, rgba(255, 255, 255, 0.1)) var(--perc, 0%));
            border-radius: 10px;
        }

        input[type=range]::-webkit-slider-thumb {
            height: 14px;
            width: 14px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -5px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.6), 0 0 6px var(--glow);
        }

        /* ── Target Selector ── */
        .target-selector {
            display: flex;
            gap: 5px;
            padding: 4px;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
        }

        .target-btn {
            flex: 1;
            text-align: center;
            padding: 7px 0;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 13px;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.2s;
        }

        .target-btn.active {
            background: var(--accent);
            background-image: none;
            color: #fff;
            box-shadow: 0 0 12px var(--glow);
        }

        /* ── Action Button ── */
        .action-btn {
            width: 100%;
            padding: 11px;
            border: 1px solid rgba(255, 59, 48, 0.2);
            color: #fff;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 16px;
            letter-spacing: 2px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 8px;
        }

        /* ── Divider ── */
        .divider {
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(255, 59, 48, 0.15), transparent);
            margin: 6px 0 22px;
        }

        /* ── Submerged styles ── */
        .submerged .control-header span,
        .submerged .control-value {
            color: #111 !important;
            text-shadow: none !important;
        }

        .submerged .control-value { color: #333 !important; }

        .submerged input[type=range]::-webkit-slider-runnable-track {
            background: linear-gradient(to right, #222 var(--perc, 0%), rgba(0, 0, 0, 0.12) var(--perc, 0%)) !important;
        }

        .submerged input[type=range]::-webkit-slider-thumb {
            background: #111 !important;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.25) !important;
        }

        .submerged .target-btn { color: #333 !important; }

        .submerged .target-btn.active {
            background: #111 !important;
            color: #fff !important;
            box-shadow: none !important;
        }

        /* Quitar pintura de sangre al estar sumergido para mantener contraste */
        .submerged .target-selector,
        .submerged .switch-track,
        .submerged .action-btn {
            background-image: none !important;
        }

        .submerged .action-btn {
            background-color: transparent !important;
            border-color: rgba(0, 0, 0, 0.25) !important;
            color: #111 !important;
        }

        .submerged .switch-track {
            background-color: rgba(0, 0, 0, 0.12) !important;
            border-color: rgba(0, 0, 0, 0.2) !important;
        }

        .submerged .switch-thumb { background: #555 !important; }

        .submerged input[type="checkbox"]:checked + .switch-track {
            background-color: #111 !important;
            border-color: #111 !important;
            box-shadow: none !important;
        }

        .submerged input[type="checkbox"]:checked + .switch-track .switch-thumb { background: #fff !important; }

        /* ── Reopen Icon ── */
        #reopenIcon {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 44px;
            height: 44px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 59, 48, 0.18);
            border-radius: 10px;
            color: var(--text-main);
            font-family: 'Bebas Neue', sans-serif;
            text-align: center;
            line-height: 42px;
            font-size: 18px;
            cursor: pointer;
            z-index: 10000;
        }
    </style>
</head>

<body>

    <div id="fovCircle"></div>

    <div id="mySensiModal">
        <div class="modal-box">
            <h2 class="modal-title">Sensi <span id="sensiNameDisplay"></span>?</h2>
            <button class="modal-btn" onclick="closeModal()">Cargar</button>
        </div>
    </div>

    <div id="canvas-container" style="pointer-events:none;"></div>

    <div class="mod-menu" id="modMenu">

        <div class="menu-header">
            <img src="LOGO.jpeg" class="header-logo"
                onerror="this.style.display='none'; document.getElementById('logoFallback').style.display='flex';"
                alt="Logo">
            <div class="header-logo-placeholder" id="logoFallback" style="display:none;">S</div>
            <div class="header-text">
                <span class="menu-title">SUNBURN</span>
                <span class="menu-subtitle">By 9B BLOODIE</span>
            </div>
            <div class="close-btn" onclick="toggleMenu()">✕</div>
        </div>

        <div class="tab-bar">
            <div class="tab-btn active" onclick="switchTab(this,'combat')">Combat</div>
            <div class="tab-btn" onclick="switchTab(this,'blood')">Blood</div>
            <div class="tab-btn" onclick="switchTab(this,'config')">Config</div>
        </div>

        <div class="milk-layer" id="milkLayer"></div>

        <div class="tab-panel active" id="tab-combat">
            <div class="menu-content" id="menuContent-combat">
                <div class="content-inner">
                    <div class="section-banner submerged-banner-check"
                        style="background-image: url('https://i.pinimg.com/originals/d0/1a/5d/d01a5d62d2a2e90e3a96fdbba7113dce.gif');">
                        <div class="section-title submerged-banner-title" id="title-combat">⚔ Combat</div>
                    </div>

                    <div class="control-group submerged-check">
                        <div class="control-header"><span>Aimlock FOV</span><span class="control-value" id="val-fov">0°</span></div>
                        <input type="range" id="fov" min="0" max="360" value="0" oninput="updateFOV(this.value)">
                    </div>

                    <div class="control-group submerged-check">
                        <div class="target-selector">
                            <div class="target-btn active" onclick="setTarget(this)">Pecho</div>
                            <div class="target-btn" onclick="setTarget(this)">Cuello</div>
                            <div class="target-btn" onclick="setTarget(this)">Cabeza</div>
                        </div>
                    </div>

                    <div class="divider"></div>

                    <div class="control-group submerged-check">
                        <div class="control-header">
                            <span>HS Rate</span>
                            <label class="switch-container">
                                <input type="checkbox" id="hs">
                                <div class="switch-track"><div class="switch-thumb"></div></div>
                            </label>
                        </div>
                    </div>

                    <div class="control-group submerged-check">
                        <div class="control-header">
                            <span>No Recoil</span>
                            <label class="switch-container">
                                <input type="checkbox" id="recoil">
                                <div class="switch-track"><div class="switch-thumb"></div></div>
                            </label>
                        </div>
                    </div>

                    <div class="control-group submerged-check">
                        <div class="control-header">
                            <span>Easy Head</span>
                            <label class="switch-container">
                                <input type="checkbox" id="easyhead">
                                <div class="switch-track"><div class="switch-thumb"></div></div>
                            </label>
                        </div>
                    </div>

                    <div class="divider"></div>

                    <div class="control-group submerged-check">
                        <div class="control-header">
                            <span>Aimbot — Rage</span>
                            <label class="switch-container">
                                <input type="checkbox" id="aim_rage">
                                <div class="switch-track"><div class="switch-thumb"></div></div>
                            </label>
                        </div>
                    </div>

                    <div class="control-group submerged-check">
                        <div class="control-header">
                            <span>SemiAimbot — AWP</span>
                            <label class="switch-container">
                                <input type="checkbox" id="aim_awp">
                                <div class="switch-track"><div class="switch-thumb"></div></div>
                            </label>
                        </div>
                    </div>

                    <div class="control-group submerged-check">
                        <div class="control-header">
                            <span>Fully Aimbot — Script</span>
                            <label class="switch-container">
                                <input type="checkbox" id="aim_script">
                                <div class="switch-track"><div class="switch-thumb"></div></div>
                            </label>
                        </div>
                    </div>

                    <div class="control-group submerged-check">
                        <div class="control-header"><span>Aimbot — M1018</span><span class="control-value" id="val-aim_m1018">OFF</span></div>
                        <input type="range" id="aim_m1018" min="0" max="1" value="0">
                    </div>
                </div>
            </div>
        </div>

        <div class="tab-panel" id="tab-blood">
            <div class="menu-content" id="menuContent-blood">
                <div class="content-inner">
                    <div class="section-banner submerged-banner-check"
                        style="background-image: url('https://i.pinimg.com/originals/b8/6f/e5/b86fe51d6dbf77b7b698b13ae3c56335.gif');">
                        <div class="section-title submerged-banner-title" id="title-blood">🩸 Blood</div>
                    </div>

                    <div class="control-group submerged-check">
                        <div class="control-header"><span>👺 Regedit Full Vermelho</span><span class="control-value" id="val-regedit">0%</span></div>
                        <input type="range" id="regedit" min="0" max="100" value="0">
                    </div>

                    <div class="control-group submerged-check">
                        <div class="control-header"><span>💀 Auxilio Gruda [VIP]</span><span class="control-value" id="val-gruda">0%</span></div>
                        <input type="range" id="gruda" min="0" max="100" value="0">
                    </div>
                </div>
            </div>
        </div>

        <div class="tab-panel" id="tab-config">
            <div class="menu-content" id="menuContent-config">
                <div class="content-inner">
                    <div class="section-banner submerged-banner-check"
                        style="background-image: url('https://i.pinimg.com/originals/09/fa/e4/09fae4879b5c83ac5620f3e0b75156fb.gif');">
                        <div class="section-title submerged-banner-title" id="title-config">⚙ Config</div>
                    </div>

                    <div class="control-group submerged-check">
                        <div class="control-header">
                            <span>Sensi Bloodz</span>
                            <label class="switch-container">
                                <input type="checkbox" id="bloodz">
                                <div class="switch-track"><div class="switch-thumb"></div></div>
                            </label>
                        </div>
                    </div>

                    <div class="control-group submerged-check">
                        <div class="control-header">
                            <span>Sensi Bloodie</span>
                            <label class="switch-container">
                                <input type="checkbox" id="bloodie">
                                <div class="switch-track"><div class="switch-thumb"></div></div>
                            </label>
                        </div>
                    </div>

                    <div class="divider"></div>

                    <div class="control-group submerged-check">
                        <button class="action-btn" onclick="openModal()">My Sensi</button>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <div id="reopenIcon" onclick="toggleMenu()">S</div>

    <script>
function switchTab(btn, id) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + id).classList.add('active');
    
    document.querySelectorAll('#tab-' + id + ' .control-group').forEach((el, i) => {
        el.style.animation = 'none';
        void el.offsetWidth; 
        el.style.animation = '';
        el.style.animationDelay = (0.04 * i) + 's';
    });
    setTimeout(() => updateSubmergedStyles(), 50);
}

let fovTimeout;
const fovCircle = document.getElementById('fovCircle');

function updateFOV(val) {
    updateSlider('fov', 'val-fov', '°');
    fovCircle.style.display = 'block';
    const size = val * 1.5;
    fovCircle.style.width = size + 'px';
    fovCircle.style.height = size + 'px';
    clearTimeout(fovTimeout);
    fovTimeout = setTimeout(() => { fovCircle.style.display = 'none'; }, 900);
}

function setTarget(el) {
    for (let s of el.parentElement.children) s.classList.remove('active');
    el.classList.add('active');
}

const sensiList = ["Strongest Sorcerer", "Ninja Slayer", "King of Heroes", "Solo Hunter", "Curse King", "Bloodie God"];
const sensiColors = ['#ff3b30', '#cc0000', '#880000', '#cc0000', '#ff3b30'];

function openModal() {
    const nd = document.getElementById('sensiNameDisplay');
    const name = sensiList[Math.floor(Math.random() * sensiList.length)];
    const color = sensiColors[Math.floor(Math.random() * sensiColors.length)];
    nd.innerText = name;
    nd.style.color = color;
    nd.style.textShadow = `0 0 15px ${color}`;
    document.getElementById('mySensiModal').style.display = 'flex';
}
function closeModal() { document.getElementById('mySensiModal').style.display = 'none'; }

function updateSlider(id, valId, suffix) {
    const slider = document.getElementById(id);
    const text = document.getElementById(valId);
    if (!slider || !text) return;

    text.innerText = (slider.max === "1") ? (slider.value === "1" ? "ON" : "OFF") : (slider.value + suffix);

    const pct = ((slider.value - slider.min) / (slider.max - slider.min)) * 100;
    const isSubmerged = slider.closest('.control-group').classList.contains('submerged');
    slider.style.setProperty('--perc', pct + '%');
    slider.style.setProperty('--fill-c', isSubmerged ? '#222' : 'var(--accent)');
}

const sliderDefs = [
    { id: 'fov', suf: '°' },
    { id: 'aim_m1018', suf: '' },
    { id: 'regedit', suf: '%' },
    { id: 'gruda', suf: '%' },
];

sliderDefs.forEach(({ id, suf }) => {
    const el = document.getElementById(id);
    if (el) {
        el.addEventListener('input', () => updateSlider(id, 'val-' + id, suf));
        updateSlider(id, 'val-' + id, suf);
    }
});

// Drag sin conflictos
let dragging = false, lastX = 0, lastY = 0;
const menu = document.getElementById('modMenu');

menu.style.display = 'flex'; 
let menuX = 0, menuY = 0;

function syncWindow() {
    if (typeof Android !== 'undefined' && Android.updateWindow) {
        const screenWidth = (typeof Android.getScreenWidth === 'function') ? Android.getScreenWidth() : (window.screen.width || 370);
        const screenHeight = (typeof Android.getScreenHeight === 'function') ? Android.getScreenHeight() : (window.screen.height || 800);
        
        if (menu.style.display !== 'none') {
            if (menuX === 0 && menuY === 0) {
                menuX = (screenWidth - 370) / 2;
                menuY = (screenHeight - (screenHeight * 0.86)) / 2;
            }
            Android.updateWindow(Math.floor(menuX), Math.floor(menuY), 370, Math.floor(screenHeight * 0.86));
        } else {
            Android.updateWindow(18, 18, 44, 44);
        }
    }
}

function onDragMove(ex, ey) {
    if (!dragging) return;
    let dx = ex - lastX;
    let dy = ey - lastY;
    
    menuX += dx;
    menuY += dy;
    
    lastX = ex;
    lastY = ey;
    
    // We don't set menu.style.left/top because the WindowManager window moves,
    // and the menu should stay at (0,0) relative to its window.
    
    syncWindow();
    updateSubmergedStyles();
}

const header = document.querySelector('.menu-header');
header.addEventListener('mousedown', e => { dragging = true; lastX = e.clientX; lastY = e.clientY; });
document.addEventListener('mousemove', e => onDragMove(e.clientX, e.clientY));
document.addEventListener('mouseup', () => dragging = false);

header.addEventListener('touchstart', e => { dragging = true; lastX = e.touches[0].clientX; lastY = e.touches[0].clientY; }, {passive: false});
document.addEventListener('touchmove', e => onDragMove(e.touches[0].clientX, e.touches[0].clientY), {passive: false});
document.addEventListener('touchend', () => dragging = false);

window.addEventListener('resize', () => {
    if (!dragging) {
        // Recalculate center based on new orientation/size if needed
        syncWindow();
    }
});

function toggleMenu() {
    const icon = document.getElementById('reopenIcon');
    const isOpen = menu.style.display !== 'none';
    menu.style.display = isOpen ? 'none' : 'flex';
    icon.style.display = isOpen ? 'block' : 'none';
    syncWindow();
}

// Leche blanca devuelta para contraste
const milkContainer = document.getElementById('milkLayer');
const milkScene = new THREE.Scene();
const milkCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 10);
milkCamera.position.z = 1;
const milkRenderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
milkContainer.appendChild(milkRenderer.domElement);

function resizeMilk() { milkRenderer.setSize(milkContainer.clientWidth, milkContainer.clientHeight); }
window.addEventListener('resize', resizeMilk);
resizeMilk();

const milkUniforms = { time: { value: 0 } };
const milkMat = new THREE.ShaderMaterial({
    uniforms: milkUniforms,
    vertexShader: `
        varying vec2 vUv;
        uniform float time;
        void main() {
            vUv = uv;
            vec3 pos = position;
            float wave = sin(pos.x * 4.0 + time * 3.0) * 0.03;
            pos.y += wave * (pos.y + 1.0); 
            gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
        }
    `,
    fragmentShader: `
        varying vec2 vUv;
        void main() {
            vec3 color = mix(vec3(0.8, 0.85, 0.95), vec3(0.98, 0.98, 1.0), vUv.y);
            gl_FragColor = vec4(color, 0.95);
        }
    `,
    transparent: true
});

const milkMesh = new THREE.Mesh(new THREE.PlaneGeometry(2, 2, 32, 32), milkMat);
milkMesh.position.y = -1.1; 
milkScene.add(milkMesh);

function animate() {
    requestAnimationFrame(animate);
    milkUniforms.time.value += 0.02;
    milkRenderer.render(milkScene, milkCamera);
}
animate();

function updateSubmergedStyles() {
    const milkLineY = menu.getBoundingClientRect().top + (menu.offsetHeight / 2);
    document.querySelectorAll('.submerged-check').forEach(group => {
        const r = group.getBoundingClientRect();
        if (r.top > milkLineY) group.classList.add('submerged');
        else group.classList.remove('submerged');
    });
}
setTimeout(syncWindow, 300);
    </script>
</body>
