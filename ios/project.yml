name: SunburnOverlay
options:
  bundleIdPrefix: com.9b
targets:
  SunburnOverlay:
    type: application
    platform: iOS
    deploymentTarget: "14.0"
    sources: [SunburnOverlay]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.9b.sunburn
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: SunburnOverlay/Info.plist
        GCC_PREPROCESSOR_DEFINITIONS: $(inherited) DEBUG=1
    dependencies:
      - sdk: WebKit.framework
